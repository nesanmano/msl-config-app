name: Deploy to VM (msl-config-server)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "target/msl-config-app-1.0-SNAPSHOT.jar"
          target: "/opt/config-server/msl-config-app/target/"
          overwrite: true

      - name: Safe restart of systemd service on VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo "Stopping service..."
            sudo systemctl stop msl-config.service
            sleep 3
            echo "Starting service..."
            sudo systemctl start msl-config.service
            echo "Service status:"
            sudo systemctl status msl-config.service --no-pager
